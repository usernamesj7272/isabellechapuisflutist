<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isabelle Chapuis | Flutist</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: #f8f5ef;
            color: #16324a;
            font-family: "Cormorant Garamond", serif;
        }

        .monogram {
            position: fixed;
            top: 34px;
            left: 42px;
            color: #b79963;
            font-size: 2.1rem;
            font-weight: 500;
            letter-spacing: -0.08em;
            opacity: .9;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 70px 30px;
        }

        .content {
            max-width: 920px;
            text-align: center;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: .16em;
            font-size: 1rem;
            color: #9b8b76;
            margin-bottom: 42px;
            font-weight: 600;
        }

        h1 {
            margin: 0;
            color: #16324a;
            font-weight: 600;
            font-size: clamp(5rem, 10vw, 9rem);
            line-height: .88;
        }

        .subtitle {
            margin-top: 34px;
            color: #16324a;
            font-size: 2rem;
            font-weight: 500;
        }

        .divider {
            width: 120px;
            height: 1px;
            background: #b79963;
            margin: 44px auto;
        }

        .intro {
            max-width: 850px;
            margin: 0 auto;
            font-size: 1.45rem;
            line-height: 1.7;
            color: #16324a;
        }

        .soon {
            margin-top: 52px;
            color: #9b8b76;
            font-size: 1.2rem;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .star {
            margin-top: 18px;
            margin-bottom: 22px;
            color: #b79963;
            font-size: 1rem;
            line-height: 1;
            opacity: .9;
        }

        footer {
            margin-top: 0;
            color: #8d7c66;
            font-size: 1rem;
            letter-spacing: .03em;
        }

        @media (max-width: 700px) {
            .monogram {
                top: 24px;
                left: 26px;
                font-size: 1.7rem;
            }

            .page {
                padding: 95px 24px 55px;
            }

            .subtitle {
                font-size: 1.55rem;
            }

            .intro {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>

<div class="monogram">IC</div>

<div class="page">
    <div class="content">

        <div class="eyebrow">
            A new website is in preparation
        </div>

        <h1>
            Isabelle<br>
            Chapuis
        </h1>

        <div class="subtitle">
            Flutist · Teacher · Lecturer
        </div>

        <div class="divider"></div>

        <div class="intro">
            A new home for Isabelle Chapuis is quietly taking shape—honoring a lifetime devoted to music, teaching, and the French flute school.
        </div>

        <div class="soon">
            Launching Soon
        </div>

        <div class="star">✦</div>

        <footer>
            isabellechapuisflutist.com
        </footer>

    </div>
</div>

</body>
</html>
